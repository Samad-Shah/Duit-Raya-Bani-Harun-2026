<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code – Berapa Duit Raya Saya?</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --lilac-bg: #1a0a2e;
    --lilac-mid: #2d1060;
    --lilac: #c8a8e9;
    --gold: #f5c842;
    --gold-light: #ffe99a;
    --gold-dark: #c49a10;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--lilac-bg);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px;
    color: white;
  }

  h1 {
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    color: var(--gold);
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .sub { color: var(--lilac); font-size: 0.85rem; text-align: center; margin-bottom: 28px; opacity: 0.7; }

  .setup-card {
    background: rgba(45,16,96,0.7);
    border: 1px solid rgba(200,168,233,0.3);
    border-radius: 16px;
    padding: 28px;
    width: 100%; max-width: 500px;
    margin-bottom: 32px;
  }
  .setup-card label {
    display: block; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--lilac); margin-bottom: 8px;
  }
  .url-input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,168,233,0.3);
    border-radius: 10px; color: white;
    font-size: 0.95rem; outline: none;
    font-family: monospace;
    transition: border-color 0.2s;
  }
  .url-input:focus { border-color: var(--gold); }
  .url-input::placeholder { color: rgba(200,168,233,0.3); }

  .gen-btn {
    width: 100%; margin-top: 16px;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 700; font-family: Georgia, serif;
    color: #2d1060; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,200,66,0.4); }

  /* ── PRINTABLE CARD ── */
  .print-card {
    display: none;
    background: white;
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%; max-width: 400px;
    text-align: center;
    box-shadow: 0 0 60px rgba(155,89,214,0.3);
    position: relative;
    overflow: hidden;
  }
  .print-card.visible { display: block; }

  /* Gold border top */
  .print-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--lilac), var(--gold), var(--gold-dark));
  }
  .print-card::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--lilac), var(--gold), var(--gold-dark));
  }

  .card-ornament {
    display: flex; justify-content: center; gap: 6px;
    margin-bottom: 12px;
  }
  .card-ornament span { color: var(--gold-dark); font-size: 1.1rem; }

  .card-title {
    font-size: 1.4rem; font-weight: 900;
    color: var(--lilac-bg);
    line-height: 1.2; margin-bottom: 4px;
  }
  .card-title em { color: var(--gold-dark); font-style: normal; }
  .card-raya { font-size: 0.8rem; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

  #qrcode {
    display: flex; justify-content: center;
    margin: 0 auto 20px;
  }
  #qrcode canvas, #qrcode img { border-radius: 8px; }

  .card-instruction {
    font-size: 0.9rem; color: #444;
    line-height: 1.5; margin-bottom: 12px;
  }
  .card-instruction strong { color: var(--lilac-bg); }

  .card-footer-ornament {
    display: flex; justify-content: center; gap: 6px; margin-top: 12px;
  }

  .print-btn {
    display: none;
    margin-top: 24px;
    padding: 13px 32px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 700; font-family: Georgia, serif;
    color: #2d1060; cursor: pointer;
    transition: transform 0.2s;
  }
  .print-btn.visible { display: inline-block; }
  .print-btn:hover { transform: translateY(-2px); }

  @media print {
    body { background: white; padding: 0; justify-content: flex-start; }
    .setup-card, .print-btn, h1, .sub { display: none !important; }
    .print-card { box-shadow: none; max-width: 100%; border-radius: 0; }
    .print-card::before, .print-card::after { display: none; }
  }
</style>
</head>
<body>

<h1>🌙 Jana QR Code Duit Raya</h1>
<p class="sub">Masukkan URL website, generate, pastu print dan tampal kat mana-mana!</p>

<div class="setup-card">
  <label>URL Website Korang</label>
  <input type="text" id="urlInput" class="url-input"
    placeholder="https://USERNAME.github.io/duit-raya/"
    value="">
  <button class="gen-btn" onclick="generateQR()">✨ Generate QR Code</button>
</div>

<div class="print-card" id="printCard">
  <div class="card-ornament">
    <span>✦</span><span>🌙</span><span>✦</span><span>⭐</span><span>✦</span>
  </div>

  <div class="card-title">Berapa <em>Duit Raya</em> Saya?</div>
  <div class="card-raya">Selamat Hari Raya Aidilfitri</div>

  <div id="qrcode"></div>

  <div class="card-instruction">
    <strong>Scan QR code ni</strong> dengan kamera phone korang,<br>
    masukkan nama, dan tengok berapa duit raya korang dapat! 🎴
  </div>

  <div class="card-footer-ornament">
    <span style="color:#c8a8e9;">✦</span>
    <span style="color:#f5c842;">❤️</span>
    <span style="color:#c8a8e9;">✦</span>
  </div>
</div>

<button class="print-btn" id="printBtn" onclick="window.print()">🖨️ Print QR Card</button>

<script>
function generateQR() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { alert('Letak URL dulu!'); return; }
  if (!url.startsWith('http')) { alert('URL kena start dengan https://'); return; }

  const container = document.getElementById('qrcode');
  container.innerHTML = '';

  new QRCode(container, {
    text: url,
    width: 220,
    height: 220,
    colorDark: '#1a0a2e',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H,
  });

  document.getElementById('printCard').classList.add('visible');
  document.getElementById('printBtn').classList.add('visible');
  document.getElementById('printCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// Allow Enter key
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generateQR();
});
</script>
</body>
</html>
